name: Alpine-APK-Collection (Main)
run-name: ${{ github.actor }} is Collecting Main APKs 🚀
on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 0 1 * *" # Update Monthly on the 1st
  release:
    types: [edited, released]
  workflow_dispatch:

jobs:
  Date:
    runs-on: ubuntu-latest
    outputs:
      Date: ${{ steps.date.outputs.date }}
    steps:
      - name: Get current date
        id: DATE
        run: |
          echo "Setting Date"
          echo "DATE=$(date '+%Y%m%d-%H%M')" >> $GITHUB_OUTPUT
          echo -e "\nWrote to file:\n$GITHUB_OUTPUT\n"
          echo "Values:"
          cat $GITHUB_OUTPUT

      - name: Get disk space
        id: DISK
        run: |
          echo -e "\nUser ID:\n$(id)"
          df -h
          echo -e "\nDisk List"
          sudo fdisk -l | grep -i disk
          echo -e "\nPermissions on /mnt"
          ls -alht /mnt

  Collect-APKs:
    needs: [Date]
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      WORKDIR: /mnt/${{vars.COLLECTOR }}

    steps:
      - name: Check out repository code
        uses: actions/checkout@v6

      - name: Setup Environment
        run: |
          echo "PATH=$PATH:$PWD/scripts" >> $GITHUB_ENV
          sudo apt-get update -y
          sudo apt-get install -y mkisofs isomd5sum wget

      - name: Run Collection for ${{ vars.COLLECTOR }}
        run: |
          sudo mkdir -vp ${{ env.WORKDIR }}/${{ vars.COLLECTOR }}
          sudo chown -R $USER ${{ env.WORKDIR }}
          echo "Collecting ${{ vars.COLLECTOR }} APKs"
          # Rsync only the latest version and selected repos/arch
          ${{ github.workspace }}/scripts/rsync-alpine.sh

      - name: Show Files
        run: ls -Alht ${{ env.WORKDIR }}

      - name: List disks
        run: df -h ${{ env.WORKDIR }}

      # - name: Upload reposync log
      #   uses: actions/upload-artifact@v7
      #   with:
      #     name: ${{ vars.COLLECTOR }}-${{ needs.Date.outputs.Date }}.log
      #     path: ${{ env.WORKDIR }}/${{ vars.COLLECTOR }}.log
      #     if-no-files-found: error

      - name: Show Consumption
        run: |
          echo -e "Disk Usage:\n$(du -chs ${{ env.WORKDIR }})\n"
          echo -e "Disk Space:\n$(df -h ${{ env.WORKDIR }})\n"
          echo -e "File Listing:\n$(ls -alhS ${{ env.WORKDIR }}*)\n"

      - name: Copy README to ${{ vars.COLLECTOR }} ISO
        run: cp -v README.md ${{ env.WORKDIR }}

      - name: ISO Table of contents
        run: |
          cd ${{ env.WORKDIR }}
          tree ${{ vars.COLLECTOR }} \
          | tee ${{ vars.COLLECTOR }}-${{ needs.Date.outputs.Date }}.iso.txt
          cp -v ${{ vars.COLLECTOR }}-${{ needs.Date.outputs.Date }}.iso.txt ${{ vars.COLLECTOR }}

      - name: Upload ISO ToC artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ vars.COLLECTOR }}-${{ needs.Date.outputs.Date }}.iso.txt
          path: ${{ env.WORKDIR }}/${{ vars.COLLECTOR }}-${{ needs.Date.outputs.Date }}.iso.txt
          if-no-files-found: error

      - name: Make ${{ vars.COLLECTOR }} ISO
        run: |
          echo "Making ISO of ${{ vars.COLLECTOR }}"
          cd ${{ env.WORKDIR }}
          mkisofs -J -R -v -T -l \
            -V ${{ vars.COLLECTOR }}-${{ needs.Date.outputs.Date }} \
            -A ${{ vars.COLLECTOR }}-${{ needs.Date.outputs.Date }} \
            -o ${{ vars.COLLECTOR }}-${{ needs.Date.outputs.Date }}.iso \
            ${{ vars.COLLECTOR }}

      - name: Implant MD5 sum into ${{ vars.COLLECTOR }}-${{ needs.Date.outputs.Date }}.iso
        run: implantisomd5 ${{ env.WORKDIR }}/${{ vars.COLLECTOR }}-${{ needs.Date.outputs.Date }}.iso

      - name: Generate ${{ vars.COLLECTOR }}-${{ needs.Date.outputs.Date }}.iso Hash
        run: |
          cd ${{ env.WORKDIR }}
          sha256sum -b ${{ vars.COLLECTOR }}-${{ needs.Date.outputs.Date }}.iso \
          | tee ${{ vars.COLLECTOR }}-${{ needs.Date.outputs.Date }}.iso.sha

      - name: Show ISO Files
        run: ls -sS1h ${{ env.WORKDIR }}/*.iso*

      - name: Upload ISO files
        uses: actions/upload-artifact@v7
        with:
          name: ${{ vars.COLLECTOR }}-${{ needs.Date.outputs.Date }}.iso
          path: ${{ env.WORKDIR }}/${{ vars.COLLECTOR }}-${{ needs.Date.outputs.Date }}.iso*
          if-no-files-found: error

      # Cleanup
      - name: Clean up
        run: |
          cd ${{ env.WORKDIR }}
          echo "Remove ${{ vars.COLLECTOR }}"
          rm -rf ${{ vars.COLLECTOR }}
          echo "Remove Artifacts"
          rm -rfv ${{ vars.COLLECTOR }}-${{ needs.Date.outputs.Date }}.iso
          rm -rfv ${{ vars.COLLECTOR }}-${{ needs.Date.outputs.Date }}.iso.sha
          rm -rfv ${{ vars.COLLECTOR }}-${{ needs.Date.outputs.Date }}.iso.txt
          echo "Done"

  Release:
    runs-on: ubuntu-latest
    needs: [Date, Collect-APKs]
    permissions:
      contents: write
      pull-requests: read
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Check out repository code
        uses: actions/checkout@v6

      - name: Download Artifacts
        uses: actions/download-artifact@v8
        with:
          merge-multiple: true
          pattern: "*.iso.*"

      - name: Show Artifacts
        run: ls -sS1h *.iso.*

      # Section to actually create a release
      - name: Set up git
        run: |
          git config user.name "$(git log -n 1 --pretty=format:%an)"
          git config user.email "$(git log -n 1 --pretty=format:%ae)"

      - name: Create tag
        uses: rickstaa/action-create-tag@v1
        id: tag_create
        with:
          tag: ${{ needs.Date.outputs.Date }}
          github_token: ${{secrets.GITHUB_TOKEN}}
          tag_exists_error: false
          message: "Release for ${{ needs.Date.outputs.Date }} run"

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v3
        with:
          name: ${{ vars.COLLECTOR }} ${{ needs.Date.outputs.Date }}
          tag_name: ${{ needs.Date.outputs.Date }}
          make_latest: true
          files: |
            *.iso.*
